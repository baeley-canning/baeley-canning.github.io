<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
  <style>
    body {
      background: linear-gradient(to right, silver, gray);
      background-size: 400% 400%;
      animation: gradient 20s ease infinite;
    }
    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    h1 {
      text-align: center;
    }
    .container {
      width: 80%;
      margin: 0 auto;
    }
    .post {
      margin-bottom: 20px;
    }
    .post h2 {
      margin-top: 0;
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>Welcome to My Blog</h1>
    <div class="post">
      <h2>Post Title</h2>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed auctor, augue id congue malesuada, velit erat dictum velit, vel congue velit mi id quam. Sed eget risus vestibulum, feugiat velit in, rutrum augue.</p>
    
</body>
</html>
