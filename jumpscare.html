<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baeley Cannings' Blog</title>
    <style>
      /*learnt gradient backgrounds from openai, changed around to be radial and adjusted sizing,timing & position*/
      body {
        background: radial-gradient(circle, rgb(68, 67, 67), rgb(78, 3, 3));
        background-size: cover;
        animation: gradient 10s ease infinite;
      }
      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body>
    <button id="scary-button">Jumpscare</button>

  </body>
</html>
