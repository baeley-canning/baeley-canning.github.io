<script>

  var btn = document.getElementById("button");

 
  window.addEventListener("scroll", function() {
 
    var scroll = window.pageYOffset;
    
    if (scroll > 0) {
      btn.style.position = "fixed";
      btn.style.top = "0";
      btn.style.left = "50%";
    
    
      
    
    } else {
     
      btn.style.position = "relative";
    }
  });
</script>
